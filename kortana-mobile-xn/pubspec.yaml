name: kortana_wallet
description: The official Kortana Blockchain mobile wallet. EVM-compatible. Non-custodial. Beautiful.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Blockchain / EVM ─────────────────────────────────────────
  web3dart:            ^2.7.3
  bip39:               ^1.0.6
  bip32:               ^2.0.0
  pointycastle:        ^3.9.1
  convert:             ^3.1.1
  http:                any
  web_socket_channel:  any

  # ─── State Management ─────────────────────────────────────────
  flutter_riverpod:    ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod:      ^2.5.1
  flutter_hooks:       ^0.20.5

  # ─── Navigation ───────────────────────────────────────────────
  go_router:           ^14.2.0

  # ─── Storage & Security ───────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  local_auth:          ^2.3.0
  encrypt:             ^5.0.3
  hive_flutter:        ^1.1.0
  hive:                ^2.2.3
  shared_preferences:  ^2.3.2

  # ─── UI & Animation ───────────────────────────────────────────
  flutter_animate:     ^4.5.0
  lottie:              ^3.1.2
  rive:                ^0.13.14
  shimmer:             ^3.0.0
  fl_chart:            ^0.69.0
  animated_text_kit:   ^4.2.3
  confetti:            ^0.7.0
  palette_generator:   ^0.3.3
  flutter_staggered_animations: ^1.1.1

  # ─── Icons & Images ───────────────────────────────────────────
  flutter_svg:         ^2.0.10+1
  cached_network_image: ^3.3.1

  # ─── Networking ───────────────────────────────────────────────
  dio:                 ^5.6.0
  # retrofit:            ^4.1.0

  # ─── Utilities ────────────────────────────────────────────────
  qr_flutter:          ^4.1.0
  mobile_scanner:      ^5.2.3
  share_plus:          ^10.0.0
  url_launcher:        ^6.3.0
  intl:                ^0.20.2
  timeago:             ^3.6.1
  clipboard:           ^0.1.3
  connectivity_plus:   ^6.0.3
  package_info_plus:   ^8.0.0
  device_info_plus:    ^10.1.0
  freezed_annotation:  ^2.4.4
  json_annotation:     ^4.9.0

  # ─── WalletConnect ────────────────────────────────────────────
  walletconnect_flutter_v2: any

  # ─── DApp Browser ─────────────────────────────────────────────
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner:          ^2.4.11
  riverpod_generator:    ^2.4.3
  freezed:               ^2.5.7
  json_serializable:     ^6.8.0
  # retrofit_generator:    ^8.1.0
  mocktail:              ^1.0.3
  very_good_analysis:    ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

