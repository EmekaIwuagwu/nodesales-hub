services:
  - type: web
    name: kortana-nodesales
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: KORTANA_RPC_URL
        sync: false
      - key: KORTANA_CHAIN_ID
        value: "72511"
      - key: DISTRIBUTOR_PRIVATE_KEY
        sync: false
      - key: DISTRIBUTOR_ADDRESS
        sync: false
      - key: NODE_SALE_ADDRESS
        sync: false
      - key: REWARD_VAULT_ADDRESS
        sync: false
      - key: GENESIS_LICENSE_ADDRESS
        sync: false
      - key: EARLY_LICENSE_ADDRESS
        sync: false
      - key: FULL_LICENSE_ADDRESS
        sync: false
      - key: PREMIUM_LICENSE_ADDRESS
        sync: false
      - key: USDT_ADDRESS
        sync: false
      - key: DNR_ADDRESS
        sync: false
      - key: TREASURY
        sync: false
      - key: ALLOWED_ORIGIN
        value: "https://nodesales-hub.onrender.com"
      - key: CRON_SECRET
        sync: false
    # Build-time ARGs baked into the Vite bundle — must be set before first deploy
    dockerContext: .
    buildArgs:
      - key: VITE_API_URL
        value: ""
      - key: VITE_CHAIN_ID
        value: "72511"
      - key: VITE_RPC_URL
        value: "https://poseidon-rpc.testnet.kortana.xyz/"
      - key: VITE_EXPLORER_URL
        value: "https://explorer.testnet.kortana.xyz"
      - key: VITE_NODE_SALE_ADDRESS
        sync: false
      - key: VITE_REWARD_VAULT_ADDRESS
        sync: false
      - key: VITE_USDT_ADDRESS
        sync: false
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
